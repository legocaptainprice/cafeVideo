<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <title>cafeVideo - Login</title>
</head>
<body>
    <div class="cafe-header-navbar">
        <div class="cafe-header-navbar-container">
            <!-- <div class="cafe-header-navbar-item"><button>Sidebar Test</button></div> -->
            <div class="cafe-header-navbar-item"><a class="cafe-navbar-title" href="{{ url_for('indexPage') }}"><h2>cafeVideo</h2></a></div>
            <form action="/searchRequest" method="POST" class="cafe-header-navbar-item cafe-search-layout">
                <input type="text" name="search" placeholder="Search for a video" class="cafe-search-box" required>
            </form>
            <div class="cafe-header-navbar-item-right cafe-header-navbar-item"><a href="login">Login</a></div>
        </div>
    </div>
    <div class="cafe-main-body">
        <div class="cafe-sidebar-left">
            <a href="{{ url_for('indexPage') }}">Home</a>
            <a href="{{ url_for('explorePage') }}">Explore</a>
            <a href="{{ url_for('indexPage') }}">cafeCorners</a>
            <p class="cafe-account-settings-sidebar-title cafe-account-settings-sidebar-title-layout">Your account</p>
            <a href="{{ url_for('indexPage') }}">Watch History</a>
            <a href="{{ url_for('indexPage') }}">Playlists</a>
            <a href="{{ url_for('likedVideosPage') }}">Liked videos</a>
            <a href="{{ url_for('indexPage') }}">Bookmarks</a>
        </div>
        <div class="cafe-video-list-body">
            <div class="cafe-login-body">
                <div class="cafe-login-title">
                    <h1>Login to cafeVideo!</h1>
                </div>
                <form action="/loginAuth" method="POST" class="cafe-login-details">
                    <input type="text" name="username" placeholder="Enter your username" class="cafe-login-box" required>
                    <input type="password" name="password" placeholder="Enter your password" class="cafe-login-box" required>
                    <button type="submit" class="cafe-comment-button">Login</button>
                </form>
                {% if error %}
                    <p style="color: red">{{error}}</p>
                {% endif %}
            </div>
            <div class="cafe-register-body">
                <div class="cafe-register-title">
                    <h1>Register an account on cafeVideo!</h1>
                </div>
                <form action="/registerAccount" method="POST" class="cafe-register-details">
                    <input type="text" name="username" placeholder="Enter your username" class="cafe-login-box" required>
                    <input type="password" name="password" placeholder="Enter your password" class="cafe-login-box" required>
                    <button type="submit" class="cafe-comment-button">Register</button>
                </form>
                {% if error %}
                    <p style="color: red">{{error}}</p>
                {% endif %}
            </div>
        </div>
    </div>
    <!-- Rename to cafeChannels -->

</body>
</html>
